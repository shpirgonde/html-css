<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Order summary card</title>

  <!-- My CSS -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="order-summary">
    <div class="order-summary__card">
      <div class="order-summary__hero">
        <img src="images/illustration-hero.svg" alt="">
      </div>
      <div class="order-summary__body">
        <h1 class="order-summary__title">Order Summary </h1>
        <div class="order-summary__description"> You can now listen to millions of songs, audiobooks, and podcasts on
          any device anywhere you like!</div>

        <div class="order-summary__plan">
          <img src="images/icon-music.svg" alt="">
          <div class="order-summary__plan__detail">
            <h5 class="order-summary__anual"> Annual Plan</h5>
            <p class="order-summary__price"> $59.99/year</p>
          </div>
          <a href="#" class="order-summary__change">change</a>
        </div>

        <div class="order-summary_proceed-btn"> Proceed to Payment</div>
        <div class="order-summary_cancel-btn">Cancel Order</div>
      </div>
    </div>

    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://github.com/shpirgonde">Shivshankar Pirgonde</a>.
    </footer>
  </div>


</body>

</html>
